name: Release

# Cut a release by pushing a version tag that matches the manifest version, e.g.:
#   git tag 1.0.5 && git push origin 1.0.5
# The tag name becomes the release version (no "v" prefix — Obsidian & BRAT
# expect the release tag to equal manifest.json "version").
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version to release (e.g. 1.0.5)"
        required: true

permissions:
  contents: write

jobs:
  release:
    # Apple Silicon runner: the system-recorder helper must be an arm64 binary.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - run: npm ci

      - name: Lint & test
        run: |
          npm run lint
          npm test

      - name: Sync manifest/versions to the release tag
        env:
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          node -e '
            const fs = require("fs");
            const v = process.env.TAG;
            const m = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
            m.version = v;
            fs.writeFileSync("manifest.json", JSON.stringify(m, null, "\t") + "\n");
            const vs = JSON.parse(fs.readFileSync("versions.json", "utf8"));
            if (!vs[v]) vs[v] = m.minAppVersion;
            fs.writeFileSync("versions.json", JSON.stringify(vs, null, "\t") + "\n");
          '

      - name: Build Swift helper (arm64)
        run: npm run build:swift

      - name: Stage helper binary + compute checksum
        id: sha
        run: |
          cp swift-helper/.build/release/SystemRecorder system-recorder
          chmod +x system-recorder
          SHA=$(shasum -a 256 system-recorder | cut -d' ' -f1)
          echo "sha256=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Helper SHA-256: ${SHA}"

      - name: Pin helper checksum into the plugin build
        env:
          SHA: ${{ steps.sha.outputs.sha256 }}
        run: |
          node -e '
            const fs = require("fs");
            const p = "src/binary.ts";
            const s = fs.readFileSync(p, "utf8").replace(
              /EXPECTED_SHA256\s*=\s*"[0-9a-f]*"/,
              `EXPECTED_SHA256 =\n\t"${process.env.SHA}"`
            );
            fs.writeFileSync(p, s);
          '

      - name: Build plugin
        run: npm run build

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            main.js manifest.json styles.css system-recorder
