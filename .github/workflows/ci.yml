name: CI

# Validates every pull request (and pushes to main): type-check, lint, tests,
# and a production build. Keep this green before merging.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 22.x
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # `npm run build` also runs `tsc --noEmit`, so this covers type-checking.
      - run: npm run build

  # The release builds the Swift helper on macOS; verify it compiles on PRs too
  # so a broken helper can't pass CI and only fail at release time.
  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - run: npm run build:swift
